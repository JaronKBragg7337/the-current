name: Verify

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

concurrency:
  group: verify-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pages: read

jobs:
  quality:
    name: Lint, test, build, and simulate
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Check out source
        uses: actions/checkout@v7
        with:
          persist-credentials: false

      - name: Use Node.js 24
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install locked dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type-check
        run: npm run typecheck

      - name: Run unit and deterministic tests
        run: npm test

      - name: Validate asset and dependency provenance
        run: |
          npm run assets:validate
          npm run licenses:validate

      - name: Build production application
        run: npm run build

      - name: Build and verify the future Heartbeat Observatory base path
        run: |
          npm run build:heartbeat
          npm run build:heartbeat:verify

      - name: Build and verify the GitHub Pages base path
        run: |
          npm run build:github
          npm run build:github:verify

      - name: Run 150-day headless simulation
        run: npm run sim:150

      - name: Preserve 150-day evidence
        uses: actions/upload-artifact@v7
        with:
          name: simulation-150d-${{ github.run_attempt }}
          path: benchmarks/results/simulation-150d.json
          if-no-files-found: error
          retention-days: 30

      - name: Configure GitHub Pages
        if: ${{ github.ref == 'refs/heads/main' && (github.event_name == 'push' || github.event_name == 'workflow_dispatch') }}
        uses: actions/configure-pages@v6

      - name: Preserve verified GitHub Pages build
        if: ${{ github.ref == 'refs/heads/main' && (github.event_name == 'push' || github.event_name == 'workflow_dispatch') }}
        uses: actions/upload-pages-artifact@v5
        with:
          path: dist

  browser:
    name: Browser · ${{ matrix.project }}
    needs: quality
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        project: [desktop-chromium, mobile-chromium]
    steps:
      - name: Check out source
        uses: actions/checkout@v7
        with:
          persist-credentials: false

      - name: Use Node.js 24
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install locked dependencies
        run: npm ci

      - name: Install Chromium and system dependencies
        run: npx playwright install --with-deps chromium

      - name: Exercise the spectator world
        run: npm run test:e2e -- --project=${{ matrix.project }}

      - name: Preserve browser evidence
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v7
        with:
          name: playwright-evidence-${{ matrix.project }}-${{ github.run_attempt }}
          path: |
            playwright-report/
            test-results/
          if-no-files-found: ignore
          retention-days: 30

  pages:
    name: Publish verified GitHub Pages build
    needs: [quality, browser]
    if: ${{ success() && github.ref == 'refs/heads/main' && (github.event_name == 'push' || github.event_name == 'workflow_dispatch') }}
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
